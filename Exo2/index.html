<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondage</title>
</head>
<body>

    <form action="#" method="POST">
        <fieldset>
            <legend>&nbsp;Pizzas......&nbsp;</legend>
            <p>Parmi la liste quelle est votre pizza préférée ? (un seul choix possible)</p>
            <div class="item_pizza">

                <input type="radio" id="marg" value="marguarita" name="pizza" >
                <label for="marg">Marguarita</label>

                <br>
                <input type="radio" id="reine" value="reine" name="pizza" >
                <label for="reine">Reine</label>

                <br>
                <input type="radio" id="cal" value="calzone" name="pizza" >
                <label for="cal">Calzone</label>

                <br>
                <input type="radio" id="3fro" value="trois-fromage" name="pizza" >
                <label for="3fro">Trois Fromages</label>

                <br>
                <input type="radio" id="tex" value="texane" name="pizza" >
                <label for="tex">Texane</label>

                <br>
                <input type="radio" id="fruit" value="Fruit2mer" name="pizza" >
                <label for="fruit">Fruit de mer</label>

                <br>
                <input type="radio" id="haw" value="hawaienne" name="pizza" >
                <label for="haw">Hawaïenne</label>

            </div>

        </fieldset>

        </br>


        <fieldset>
            <legend>&nbsp;Fruits......&nbsp;</legend>
            <p>Quels sont vos fruit préférés ? (plusieur choix possibles)</p>
            <div class="item_fruit">
                <input type="checkbox" id="frai" value="fraises" name="fruit" >
                <label for="frai">Fraises</label>
                <br>
                <input type="checkbox" id="fram" value="framboises" name="fruit" >
                <label for="fram">Framboises</label>

                <br>
                <input type="checkbox" id="myr" value="myrtilles" name="fruit" >
                <label for="myr">Myrtilles</label>

                <br>
                <input type="checkbox" id="peche" value="peches" name="fruit" >
                <label for="peche">Pêches</label>

                <br>
                <input type="checkbox" id="abri" value="abricots" name="fruit" >
                <label for="abri">Abricots</label>

                <br>
                <input type="checkbox" id="poire" value="poire" name="fruit" >
                <label for="poire">Poires</label>

                <br>
                <input type="checkbox" id="pomme" value="pommes" name="fruit" >
                <label for="pomme">Pommes</label>
            </div>
        </fieldset>

        <br>
        <input type="submit" name="btn" id ="btn" value="Envoyer">

    </form>



</body>
</html>
