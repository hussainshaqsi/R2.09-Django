<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Ajout d'un Livre</title></head>
<body>
    <h1>Ajouter un livre</h1>

        {% csrf_token %}
        {{ form.as_ul }}

    </form>
    <a href="/bibliotheque/">Retour à la liste</a>
</body>
</html>
