{% extends "bibliotheque/skelete.html" %}
{% block content %}
<h1>{{ categorie.nom }}</h1>
<p>{{ categorie.descriptif }}</p>

<h2>Books in this category</h2>
<ul>
{% for livre in categorie.livres.all %}
  <li><a href="/bibliotheque/livres/{{ livre.id }}/">{{ livre.titre }}</a></li>
{% empty %}
  <li>No books in this category.</li>
{% endfor %}
</ul>

<a href="/bibliotheque/categories/">back</a>
{% endblock %}
